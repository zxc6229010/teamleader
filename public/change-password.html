<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>首次登入｜更改密碼</title>
<style>
:root{--primary:#0088FF;--primary-dark:#0077E6;--bg1:#eef2f7;--bg2:#e5eaf2;--text:#111827;--muted:#6b7280;--border:#eef2f7;}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;}
body{background:linear-gradient(180deg,var(--bg1),var(--bg2));min-height:100vh;display:flex;flex-direction:column;align-items:center;color:var(--text);}
header{margin-top:50px;text-align:center;}
header img{width:70px;margin-bottom:14px;}
header h1{font-size:26px;font-weight:800;letter-spacing:1px;color:#1f2937;}
header p{margin-top:6px;letter-spacing:4px;font-size:13px;color:var(--muted);}
.card{margin-top:28px;background:white;width:min(420px,calc(100% - 20px));padding:28px 26px;border-radius:18px;box-shadow:0 20px 40px rgba(0,0,0,0.08);border:1px solid var(--border);}
.card h2{font-size:20px;margin-bottom:10px;}
.small{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:12px;}
.label{font-size:14px;margin-top:12px;margin-bottom:6px;display:block;color:#374151;}
input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #e5e7eb;background:#f9fafb;font-size:14px;}
input:focus{outline:none;border:1px solid #3b82f6;background:white;}
button{width:100%;padding:14px;margin-top:18px;border-radius:14px;border:none;font-size:15px;font-weight:900;cursor:pointer;transition:all .2s ease;background:var(--primary);color:white;}
button:hover{background:var(--primary-dark);}
button:disabled{opacity:.6;cursor:not-allowed;}
#msg{margin-top:12px;font-size:13px;text-align:center;color:#ef4444;line-height:1.6;}
#ok{margin-top:12px;font-size:13px;text-align:center;color:#16a34a;line-height:1.6;}
footer{margin-top:24px;margin-bottom:30px;font-size:12px;color:#9ca3af;}
</style>
</head>
<body>

<header>
  <img src="./schoolbadge.gif" alt="校徽">
  <h1>校專車路隊長管理系統</h1>
  <p>TEAMLEADER SYSTEM</p>
</header>

<div class="card">
  <h2>首次登入｜請更改密碼</h2>
  <div class="small">
    你的初始密碼是「班級座號」。為了安全，第一次登入必須設定新密碼。<br>
    若有疑問請洽詢管理員。
  </div>

  <label class="label">新密碼</label>
  <input id="pw1" type="password" placeholder="至少 6 碼">

  <label class="label">再輸入一次</label>
  <input id="pw2" type="password" placeholder="再次輸入新密碼">

  <button id="btnSave">儲存並進入系統</button>

  <div id="msg"></div>
  <div id="ok"></div>
</div>

<footer>© TeamLeader</footer>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAXgHiQ-Kh6cv4kkOFuHVCUOwD-C1HoUQI",
  authDomain: "teamleader-system.firebaseapp.com",
  projectId: "teamleader-system",
};
if (!firebase.apps || !firebase.apps.length) firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

const msg = document.getElementById("msg");
const ok = document.getElementById("ok");
const btn = document.getElementById("btnSave");

function setErr(t){ msg.textContent=t||""; ok.textContent=""; }
function setOk(t){ ok.textContent=t||""; msg.textContent=""; }

auth.onAuthStateChanged(async (user)=>{
  if(!user){ location.href="index.html"; return; }

  try{
    const uDoc = await db.collection("users").doc(user.uid).get();
    const u = uDoc.exists ? uDoc.data() : null;

    if(!u || u.enabled !== true){
      await auth.signOut();
      location.href="index.html";
      return;
    }

    // 若不需要改密碼，直接回 dashboard
    if(u.mustChangePassword !== true){
      location.href="dashboard.html";
      return;
    }
  }catch(e){
    setErr("讀取權限失敗，請洽詢管理員。");
  }
});

btn.onclick = async ()=>{
  setErr(""); setOk("");

  const p1 = document.getElementById("pw1").value;
  const p2 = document.getElementById("pw2").value;

  if(!p1 || !p2){ setErr("請輸入新密碼並再次確認。"); return; }
  if(p1.length < 6){ setErr("密碼至少需要 6 碼。"); return; }
  if(p1 !== p2){ setErr("兩次輸入的密碼不一致。"); return; }

  btn.disabled = true;

  try{
    const user = auth.currentUser;
    await user.updatePassword(p1);

    await db.collection("users").doc(user.uid).set({
      mustChangePassword: false,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    }, { merge:true });

    setOk("✅ 已更新密碼，正在進入系統…");
    setTimeout(()=>location.href="dashboard.html", 700);

  }catch(e){
    // 若太久沒重新登入，firebase 會要求重新驗證
    if(e.code === "auth/requires-recent-login"){
      setErr("為了安全，請重新登入後再更改密碼。");
      await auth.signOut();
      setTimeout(()=>location.href="index.html", 900);
    }else{
      setErr("更新失敗，請稍後再試或洽詢管理員。");
    }
    btn.disabled = false;
  }
};
</script>
</body>
</html>
