<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>違規登記</title>

<style>
body{
  background:#eef2f7;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
  padding:20px;
}
.card{
  background:white;
  max-width:520px;
  margin:auto;
  padding:20px;
  border-radius:18px;
  box-shadow:0 20px 40px rgba(0,0,0,.08);
}
h2{margin-bottom:14px;}

input,select{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:12px;
  border:1px solid #e5e7eb;
}

button{
  margin-top:16px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#0088FF;
  color:white;
  font-weight:700;
  cursor:pointer;
}

.msg{
  margin-top:12px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="card">
  <h2>違規登記</h2>

  <label>學號</label>
  <input id="studentId">

  <label>違規類型</label>
  <select id="type">
    <option>未排隊</option>
    <option>遲到</option>
    <option>喧嘩</option>
    <option>其他</option>
  </select>

  <label>備註（可空）</label>
  <input id="note">

  <button id="btnSubmit">送出</button>

  <div class="msg" id="msg"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "teamleader-system.firebaseapp.com",
  projectId: "teamleader-system",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const msg = document.getElementById("msg");

async function getSemester(){
  const doc = await db.collection("settings").doc("global").get();
  return doc.data().active_semester_id;
}

document.getElementById("btnSubmit").onclick = async ()=>{
  msg.textContent = "";

  const studentId = document.getElementById("studentId").value.trim();
  const type = document.getElementById("type").value;
  const note = document.getElementById("note").value.trim();

  if(!studentId){
    msg.textContent = "請輸入學號";
    return;
  }

  const userSnap = await db.collection("users")
    .where("studentId","==",studentId)
    .limit(1)
    .get();

  if(userSnap.empty){
    msg.textContent = "找不到學生";
    return;
  }

  const user = userSnap.docs[0].data();
  const uid = userSnap.docs[0].id;

  const semesterId = await getSemester();

  await db.collection("semesters")
    .doc(semesterId)
    .collection("violations")
    .add({
      studentId,
      name: user.name,
      classSeat: user.classSeat || "",

      type,
      note,

      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      createdBy: auth.currentUser.uid,
      createdByRole: "busLeader",

      semesterId,
      status: "active"
    });

  msg.textContent = "✅ 已登記";
};
</script>

</body>
</html>
