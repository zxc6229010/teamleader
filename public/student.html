<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>校專車路隊長管理系統｜學生專區</title>

<style>
:root{
  --primary:#0088FF;
  --primary-dark:#0077E6;
  --bg1:#eef2f7;
  --bg2:#e5eaf2;
  --text:#111827;
  --muted:#6b7280;
  --border:#eef2f7;
  --danger:#ef4444;
  --success:#16a34a;
}
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
}
body{
  background:linear-gradient(180deg,var(--bg1),var(--bg2));
  min-height:100vh;
  color:var(--text);
}
a{ color:inherit; text-decoration:none; }

.app{
  width:min(1100px, calc(100% - 28px));
  margin:20px auto 24px;
  display:grid;
  grid-template-columns:280px 1fr;
  gap:18px;
}
@media (max-width:900px){
  .app{
    grid-template-columns:1fr;
    width:calc(100% - 18px);
    margin:12px auto 16px;
  }
}

.sidebar{
  background:#fff;
  border-radius:18px;
  box-shadow:0 20px 40px rgba(0,0,0,.08);
  padding:18px 16px;
  position:sticky;
  top:18px;
  height:calc(100vh - 36px);
  overflow:auto;
}
.brand{
  display:flex;
  gap:12px;
  align-items:center;
  padding:10px 10px 14px;
  border-bottom:1px solid var(--border);
  margin-bottom:12px;
}
.brand img{
  width:42px;
  height:42px;
  border-radius:12px;
  background:#f3f4f6;
}
.brand h1{
  font-size:16px;
  font-weight:800;
  color:#1f2937;
  line-height:1.2;
}
.brand p{
  font-size:11px;
  color:var(--muted);
  letter-spacing:2px;
  margin-top:3px;
}
.nav{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:10px;
}
.navbtn{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  border-radius:14px;
  border:1px solid transparent;
  cursor:pointer;
  transition:.15s ease;
}
.navbtn:hover{
  background:#f9fafb;
  border-color:var(--border);
}
.navbtn.active{
  background:var(--primary);
  color:#fff;
}
.icon{
  width:34px;
  height:34px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,136,255,.12);
  color:var(--primary);
  font-weight:800;
}
.navbtn.active .icon{
  background:rgba(255,255,255,.22);
  color:#fff;
}
.navlabel{
  display:flex;
  flex-direction:column;
  gap:2px;
}
.navlabel b{ font-size:14px; }
.navlabel span{ font-size:12px; opacity:.9; }

.sidefoot{
  margin-top:16px;
  padding-top:14px;
  border-top:1px solid var(--border);
}
.small{
  font-size:12px;
  color:var(--muted);
  line-height:1.7;
}
.logout{
  margin-top:10px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:14px;
  background:var(--primary);
  color:#fff;
  font-weight:800;
  cursor:pointer;
}
.logout:hover{ background:var(--primary-dark); }

.main{
  background:#fff;
  border-radius:18px;
  box-shadow:0 20px 40px rgba(0,0,0,.08);
  padding:18px 18px 22px;
  overflow:hidden;
}
.topbar{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  border-bottom:1px solid var(--border);
  padding-bottom:14px;
  margin-bottom:14px;
}
.leftTop{
  display:flex;
  align-items:flex-start;
  gap:10px;
}
.hamburger{
  display:none;
  width:44px;
  height:44px;
  border-radius:14px;
  border:1px solid var(--border);
  background:#f9fafb;
  cursor:pointer;
  align-items:center;
  justify-content:center;
}
.hamburger svg{
  width:22px;
  height:22px;
}
@media (max-width:900px){
  .hamburger{ display:flex; }
  .sidebar{
    position:fixed;
    top:0;
    left:0;
    height:100vh;
    width:86vw;
    max-width:320px;
    border-radius:0 18px 18px 0;
    transform:translateX(-102%);
    transition:transform .22s ease;
    z-index:999;
    box-shadow:0 20px 60px rgba(0,0,0,.25);
  }
  .sidebar.open{ transform:translateX(0); }
}
.drawerBackdrop{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(17,24,39,.38);
  z-index:998;
}
.drawerBackdrop.show{ display:block; }

.pageTitle h2{
  font-size:18px;
}
.pageTitle p{
  font-size:12px;
  color:var(--muted);
  letter-spacing:1px;
  margin-top:4px;
}

.userbox{
  display:flex;
  align-items:center;
  gap:10px;
  background:#f9fafb;
  border:1px solid var(--border);
  padding:10px 12px;
  border-radius:14px;
  min-width:220px;
}
.userdot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--success);
}
.userinfo{
  display:flex;
  flex-direction:column;
  gap:2px;
}
.userinfo b{ font-size:13px; }
.userinfo span{
  font-size:12px;
  color:var(--muted);
}

.card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:18px;
  padding:16px;
}
.card + .card{ margin-top:14px; }
.card h3{
  font-size:15px;
  margin-bottom:8px;
}
.card p{
  font-size:12px;
  color:var(--muted);
  line-height:1.7;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:6px 10px;
  border:1px solid var(--border);
  border-radius:999px;
  background:#f9fafb;
  font-size:12px;
  color:var(--muted);
}
.badge.imp{
  color:#7c3aed;
  border-color:#e9d5ff;
  background:#faf5ff;
}

.notice{
  margin-top:10px;
  font-size:12px;
  color:var(--muted);
  line-height:1.7;
}

.tableWrap{
  margin-top:12px;
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
}
table{
  width:100%;
  border-collapse:collapse;
}
th, td{
  padding:12px 12px;
  font-size:12px;
  border-bottom:1px solid var(--border);
  text-align:left;
  vertical-align:top;
}
th{
  background:#f9fafb;
  color:#374151;
  font-weight:900;
}
tr:last-child td{ border-bottom:none; }
.empty{
  color:var(--muted);
  padding:18px 12px;
  font-size:12px;
}

.status{
  display:inline-flex;
  align-items:center;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:800;
}
.status.pending{
  color:#b45309;
  background:#fffbeb;
  border:1px solid #fde68a;
}
.status.done{
  color:#065f46;
  background:#ecfdf5;
  border:1px solid #a7f3d0;
}
.status.void{
  color:#991b1b;
  background:#fef2f2;
  border:1px solid #fecaca;
}

.loadOverlay{
  position:fixed;
  inset:0;
  z-index:2000;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(238,242,247,.72);
  backdrop-filter:blur(10px);
  transition:opacity .25s ease, visibility .25s ease;
}
.loadOverlay.hide{
  opacity:0;
  visibility:hidden;
  pointer-events:none;
}
.loadPanel{
  width:min(720px, calc(100% - 28px));
  border-radius:22px;
  background:rgba(255,255,255,.86);
  border:1px solid rgba(229,234,242,.9);
  box-shadow:0 28px 70px rgba(0,0,0,.18);
  overflow:hidden;
}
.loadTopBar{
  height:4px;
  background:rgba(238,242,247,.9);
  overflow:hidden;
}
.loadBar{
  height:4px;
  width:12%;
  background:linear-gradient(90deg, var(--primary), #47b1ff, var(--primary));
  background-size:200% 100%;
  animation:barGlow 1.2s linear infinite;
  transition:width .18s ease;
}
@keyframes barGlow{
  0%{ background-position:0% 50%; }
  100%{ background-position:200% 50%; }
}
.loadHeader{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 18px 12px;
}
.loadHeader img{
  width:44px;
  height:44px;
  border-radius:14px;
  background:#f3f4f6;
  border:1px solid rgba(229,234,242,.9);
}
.loadSpin{
  width:18px;
  height:18px;
  border-radius:50%;
  border:2px solid rgba(0,136,255,.18);
  border-top-color:rgba(0,136,255,.9);
  animation:spin .8s linear infinite;
}
@keyframes spin{ to{ transform:rotate(360deg); } }
.loadSkeleton{
  padding:4px 18px 18px;
}
.skLine, .skCard{
  position:relative;
  overflow:hidden;
  background:rgba(238,242,247,.95);
  border:1px solid rgba(229,234,242,.95);
}
.skLine{
  height:12px;
  border-radius:999px;
  margin:10px 0;
}
.skGrid{
  margin-top:14px;
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}
.skCard{
  border-radius:18px;
  padding:14px;
  min-height:120px;
}
.skLine::after, .skCard::after{
  content:"";
  position:absolute;
  inset:0;
  transform:translateX(-60%);
  background:linear-gradient(90deg,
    rgba(238,242,247,0) 0%,
    rgba(255,255,255,.85) 45%,
    rgba(238,242,247,0) 100%
  );
  animation:shimmer 1.1s ease-in-out infinite;
}
@keyframes shimmer{
  0%{ transform:translateX(-65%); }
  100%{ transform:translateX(65%); }
}
.w35{ width:35%; } .w40{ width:40%; } .w55{ width:55%; }
.w60{ width:60%; } .w70{ width:70%; } .w85{ width:85%; } .w92{ width:92%; }
</style>
</head>
<body>

<div class="loadOverlay" id="loadOverlay">
  <div class="loadPanel">
    <div class="loadTopBar"><div class="loadBar" id="loadBar"></div></div>
    <div class="loadHeader">
      <img src="./schoolbadge.gif" alt="logo">
      <div class="loadSpin" aria-hidden="true"></div>
    </div>
    <div class="loadSkeleton">
      <div class="skLine w60"></div>
      <div class="skLine w85"></div>
      <div class="skLine w55"></div>
      <div class="skGrid">
        <div class="skCard">
          <div class="skLine w35"></div>
          <div class="skLine w92"></div>
          <div class="skLine w70"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="drawerBackdrop" id="drawerBackdrop"></div>

<div class="app" id="app" style="display:none;">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <img src="./schoolbadge.gif" alt="校徽">
      <div>
        <h1>校專車路隊長管理系統</h1>
        <p>TEAMLEADER SYSTEM</p>
      </div>
    </div>

    <nav class="nav">
      <div class="navbtn active">
        <div class="icon">📄</div>
        <div class="navlabel">
          <b>我的違規紀錄</b>
          <span>當學期查詢</span>
        </div>
      </div>
    </nav>

    <div class="sidefoot">
      <div class="small" id="semesterHint">學期：讀取中…</div>
      <div class="small" id="impHint" style="margin-top:8px;"></div>
      <button class="logout" id="btnLogout">登出</button>
      <div class="small" style="margin-top:10px;color:#9ca3af;">© TeamLeader</div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="leftTop">
        <button class="hamburger" id="btnHamburger" aria-label="開啟選單">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 6h16"></path>
            <path d="M4 12h16"></path>
            <path d="M4 18h16"></path>
          </svg>
        </button>

        <div class="pageTitle">
          <h2>我的違規紀錄</h2>
          <p>僅顯示目前學期與本人資料</p>
        </div>
      </div>

      <div class="userbox">
        <div class="userdot"></div>
        <div class="userinfo">
          <b id="userLine1">讀取中…</b>
          <span id="userLine2">—</span>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>身分資訊</h3>
      <div class="notice" id="meInfo">讀取中…</div>
      <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;">
        <span class="badge" id="badgeSemester">學期：—</span>
        <span class="badge" id="badgeCount">違規筆數：—</span>
        <span class="badge" id="badgeImp" style="display:none;">目前為模擬身份</span>
      </div>
    </div>

    <div class="card">
      <h3>違規紀錄列表</h3>
      <p>若有疑問，請洽詢車長幹部或行政人員確認。</p>

      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th style="width:140px;">日期</th>
              <th style="width:140px;">類型</th>
              <th>內容</th>
              <th style="width:140px;">狀態</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="4" class="empty">讀取中…</td></tr>
          </tbody>
        </table>
      </div>

      <div class="notice" id="listNote"></div>
    </div>
  </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAXgHiQ-Kh6cv4kkOFuHVCUOwD-C1HoUQI",
  authDomain: "teamleader-system.firebaseapp.com",
  projectId: "teamleader-system",
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// 第二個 app：專門給模擬身份登入，避免把原管理員主視窗登出
let studentApp = null;
try{
  studentApp = firebase.app("studentSession");
}catch(_){
  studentApp = firebase.initializeApp(firebaseConfig, "studentSession");
}
const studentAuth = studentApp.auth();
const studentDb = studentApp.firestore();

const FN_EXCHANGE = "https://us-central1-teamleader-system.cloudfunctions.net/exchangeImpersonationSession";

const loadOverlay = document.getElementById("loadOverlay");
const loadBar = document.getElementById("loadBar");
const app = document.getElementById("app");

const sidebar = document.getElementById("sidebar");
const backdrop = document.getElementById("drawerBackdrop");
const btnHamburger = document.getElementById("btnHamburger");

const semesterHint = document.getElementById("semesterHint");
const impHint = document.getElementById("impHint");
const userLine1 = document.getElementById("userLine1");
const userLine2 = document.getElementById("userLine2");

const meInfo = document.getElementById("meInfo");
const badgeSemester = document.getElementById("badgeSemester");
const badgeCount = document.getElementById("badgeCount");
const badgeImp = document.getElementById("badgeImp");

const tbody = document.getElementById("tbody");
const listNote = document.getElementById("listNote");

let prog = 0;
let progTimer = null;
function startProgress(){
  stopProgress();
  prog = 8;
  loadBar.style.width = prog + "%";
  progTimer = setInterval(()=>{
    if(prog < 92){
      prog += Math.random()*3.1;
      if(prog > 92) prog = 92;
      loadBar.style.width = Math.floor(prog) + "%";
    }
  }, 180);
}
function stopProgress(){
  if(progTimer){ clearInterval(progTimer); progTimer = null; }
}
async function finishEnter(){
  stopProgress();
  loadBar.style.width = "100%";
  await new Promise(r=>setTimeout(r, 160));
  app.style.display = "grid";
  loadOverlay.classList.add("hide");
  await new Promise(r=>setTimeout(r, 260));
  loadOverlay.style.display = "none";
}
function openDrawer(){ sidebar.classList.add("open"); backdrop.classList.add("show"); }
function closeDrawer(){ sidebar.classList.remove("open"); backdrop.classList.remove("show"); }
btnHamburger.addEventListener("click", openDrawer);
backdrop.addEventListener("click", closeDrawer);

document.getElementById("btnLogout").onclick = async ()=>{
  try{ await studentAuth.signOut(); }catch(_){}
  try{ await auth.signOut(); }catch(_){}
  location.href = "index.html";
};

function qs(name){
  const u = new URL(location.href);
  return u.searchParams.get(name);
}
function fmtTs(ts){
  try{
    if(!ts) return "—";
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString("zh-TW");
  }catch(_){ return "—"; }
}
function escapeHtml(s){
  return String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}
function pickStatus(v){
  const s = String(v?.status || "").toLowerCase();
  if(s.includes("void") || s.includes("銷")) return ["void", v?.status || "已銷除"];
  if(s.includes("done") || s.includes("完成") || s.includes("處理")) return ["done", v?.status || "已處理"];
  return ["pending", v?.status || "未處理"];
}

async function getSemesterId(dbRef){
  const sDoc = await dbRef.collection("settings").doc("global").get();
  return String(sDoc.get("active_semester_id") || "");
}

async function signInByImpersonationIfNeeded(){
  const imp = qs("imp");
  const sid = qs("sid");
  if(!(imp === "1" && sid)) return false;

  badgeImp.style.display = "";
  impHint.textContent = "目前為模擬身份查看";
  badgeImp.classList.add("imp");

  const res = await fetch(FN_EXCHANGE, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ sessionId: sid })
  });
  const data = await res.json().catch(()=> ({}));

  if(!res.ok || !data?.customToken){
    throw new Error(data?.error || "模擬登入失敗");
  }

  await studentAuth.signInWithCustomToken(data.customToken);
  return true;
}

async function loadStudentPage(activeAuth, activeDb, isImpersonated){
  const user = activeAuth.currentUser;
  if(!user){
    location.href = "index.html";
    return;
  }

  const userDocSnap = await activeDb.collection("users").doc(user.uid).get();
  const userDoc = userDocSnap.exists ? userDocSnap.data() : null;

  if(!userDoc || userDoc.enabled !== true){
    await activeAuth.signOut();
    location.href = "index.html";
    return;
  }

  const roles = userDoc.roles || {};
  if(roles.student !== true && roles.superAdmin !== true && !isImpersonated){
    // 不是學生且不是模擬進入時，不讓進學生頁
    location.href = "dashboard.html";
    return;
  }

  const semesterId = await getSemesterId(activeDb);
  semesterHint.textContent = "學期：" + (semesterId || "未設定");
  badgeSemester.textContent = "學期：" + (semesterId || "未設定");

  userLine1.textContent = `${userDoc.title || "學生"}｜${userDoc.name || (user.email || "")}`;
  userLine2.textContent = user.email || user.uid;

  meInfo.innerHTML =
    `姓名：<b>${escapeHtml(userDoc.name || "—")}</b><br>` +
    `學號：<b>${escapeHtml(userDoc.studentId || "—")}</b><br>` +
    `班級座號：<b>${escapeHtml(userDoc.classSeat || "—")}</b><br>` +
    `身份：<b>學生</b>` + (isImpersonated ? `｜<span style="color:#7c3aed;">模擬查看中</span>` : "");

  if(!semesterId){
    tbody.innerHTML = `<tr><td colspan="4" class="empty">目前尚未設定學期。</td></tr>`;
    badgeCount.textContent = "違規筆數：0";
    listNote.textContent = "";
    return;
  }

  // 只查當學期 violations，並只顯示自己的
  // 建議 violations 文件至少要有：studentUid / date / type / content / status
  const snap = await activeDb
    .collection("semesters").doc(semesterId)
    .collection("violations")
    .where("studentUid", "==", user.uid)
    .get();

  const rows = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));

  rows.sort((a,b)=>{
    const at = a.date?.toDate ? a.date.toDate().getTime() : 0;
    const bt = b.date?.toDate ? b.date.toDate().getTime() : 0;
    return bt - at;
  });

  badgeCount.textContent = `違規筆數：${rows.length}`;

  if(rows.length === 0){
    tbody.innerHTML = `<tr><td colspan="4" class="empty">目前沒有違規紀錄。</td></tr>`;
    listNote.textContent = "若你認為資料有誤，請洽詢管理人員。";
    return;
  }

  tbody.innerHTML = "";
  rows.forEach(v=>{
    const [cls, txt] = pickStatus(v);
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${escapeHtml(fmtTs(v.date || v.createdAt))}</td>
      <td>${escapeHtml(v.type || "—")}</td>
      <td>${escapeHtml(v.content || v.reason || "—")}</td>
      <td><span class="status ${cls}">${escapeHtml(txt)}</span></td>
    `;
    tbody.appendChild(tr);
  });

  listNote.textContent = "本頁僅供查詢本人當學期紀錄。";
}

(async function init(){
  startProgress();
  try{
    const impersonated = await signInByImpersonationIfNeeded();

    if(impersonated){
      await new Promise((resolve, reject)=>{
        const off = studentAuth.onAuthStateChanged(async (u)=>{
          if(!u) return;
          off();
          try{
            await loadStudentPage(studentAuth, studentDb, true);
            resolve();
          }catch(e){
            reject(e);
          }
        });
      });
    }else{
      await new Promise((resolve, reject)=>{
        const off = auth.onAuthStateChanged(async (u)=>{
          if(!u){
            off();
            location.href = "index.html";
            return;
          }
          off();
          try{
            await loadStudentPage(auth, db, false);
            resolve();
          }catch(e){
            reject(e);
          }
        });
      });
    }

    await finishEnter();
  }catch(e){
    console.error("[student init]", e);
    meInfo.textContent = "載入失敗：" + (e.message || String(e));
    tbody.innerHTML = `<tr><td colspan="4" class="empty">資料載入失敗，請稍後再試。</td></tr>`;
    await finishEnter();
  }
})();
</script>
</body>
</html>
