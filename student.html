<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>學生頁面｜違規查詢</title>

<style>
:root{
  --primary:#0088FF;
  --bg:#eef2f7;
  --card:#ffffff;
  --border:#e5e7eb;
}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
  background:var(--bg);
}
.app{
  display:grid;
  grid-template-columns:260px 1fr;
  min-height:100vh;
}
.sidebar{
  background:#fff;
  border-right:1px solid var(--border);
  padding:20px;
}
.sidebar h2{
  font-size:16px;
  margin-bottom:20px;
}
.navbtn{
  padding:12px;
  border-radius:12px;
  cursor:pointer;
  background:var(--primary);
  color:white;
  font-weight:800;
}
.main{
  padding:30px;
}
.card{
  background:var(--card);
  border-radius:16px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}
.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  background:#f3f4f6;
  font-size:12px;
  margin-bottom:10px;
}
.table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}
.table th, .table td{
  padding:10px;
  border-bottom:1px solid #eee;
  font-size:14px;
}
.table th{
  background:#f9fafb;
  text-align:left;
}
.empty{
  text-align:center;
  color:#6b7280;
  padding:20px;
}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <h2>學生系統</h2>
    <div class="navbtn">📄 我的違規紀錄</div>
  </aside>

  <main class="main">
    <div class="card">
      <div class="badge" id="userInfo">讀取中…</div>

      <h3>違規紀錄</h3>

      <table class="table">
        <thead>
          <tr>
            <th>日期</th>
            <th>違規項目</th>
            <th>處理狀態</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="3" class="empty">讀取中…</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "你的APIKEY",
  authDomain: "你的authDomain",
  projectId: "你的projectId"
};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* ===== 模擬支援 ===== */
function getImpersonation(){
  try{
    const v = sessionStorage.getItem("impersonation");
    if(!v) return null;
    return JSON.parse(v);
  }catch(e){ return null; }
}
function getEffectiveUid(){
  const imp = getImpersonation();
  return imp?.targetUid || auth.currentUser?.uid;
}

/* ===== 主流程 ===== */
auth.onAuthStateChanged(async (user)=>{
  if(!user){
    location.href="index.html";
    return;
  }

  const uid = getEffectiveUid();

  const userDoc = await db.collection("users").doc(uid).get();
  if(!userDoc.exists){
    alert("找不到使用者資料");
    return;
  }

  const data = userDoc.data();
  document.getElementById("userInfo").textContent =
    `${data.name || ""}｜${data.studentId || ""}`;

  // 讀違規資料
  const snap = await db.collection("violations")
    .where("studentUid","==",uid)
    .orderBy("date","desc")
    .get();

  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  if(snap.empty){
    tbody.innerHTML = `<tr><td colspan="3" class="empty">目前沒有違規紀錄</td></tr>`;
    return;
  }

  snap.forEach(doc=>{
    const v = doc.data();
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${new Date(v.date.seconds*1000).toLocaleDateString()}</td>
      <td>${v.type || ""}</td>
      <td>${v.status || "未處理"}</td>
    `;
    tbody.appendChild(tr);
  });
});
</script>

</body>
</html>
